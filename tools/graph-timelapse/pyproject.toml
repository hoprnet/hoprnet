[project]
name = "graph-timelapse"
version = "0.1.0"
description = "Generate timelapse GIFs of HOPR path activation and edge heatmaps from node logs"
requires-python = ">=3.11"
dependencies = ["pillow>=10.0", "playwright>=1.40"]

[project.scripts]
graph-timelapse = "graph_timelapse.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graph_timelapse"]
