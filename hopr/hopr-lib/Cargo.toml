[package]
name = "hopr-lib"
description = "HOPR library implementing the HOPR protocol"
version = "4.0.2-rc.5"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "mixnet", "libp2p", "privacy"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "cryptography"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]
doctest = false

[[test]]
name = "api_general"
required-features = ["testing"]

[[test]]
name = "chain_operations-size2"
required-features = ["testing"]

[[test]]
name = "chain_operations-size3"
required-features = ["testing"]

[[test]]
name = "stress_cluster-size3"
required-features = ["testing"]

[[test]]
name = "transport_liveness-size3"
required-features = ["testing"]

[[test]]
name = "transport_p2p-size3"
required-features = ["testing"]

[[test]]
name = "transport_session"
required-features = ["testing"]

[[test]]
name = "transport_session-size3"
required-features = ["testing"]

[[test]]
name = "transport_tickets"
required-features = ["testing"]


[features]
capture = ["hopr-transport/capture"]
default = []
telemetry = [
  "hopr-transport/telemetry",
  "hopr-api/types-telemetry",
  "hopr-utils/telemetry",
]
fixed-rng = ["hopr-api/types-fixed-rng"]
runtime-tokio = [
  "hopr-utils/runtime-tokio",
  "hopr-utils/network-types-runtime-tokio",
  "hopr-transport/runtime-tokio",
  "hopr-utils/parallelize-runtime-tokio",
  "dep:tokio",
]
serde = [
  "dep:cfg_eval",
  "dep:humantime-serde",
  "dep:serde",
  "dep:serde_with",
  "hopr-api/serde",
  "hopr-utils/serde",
  "hopr-transport/serde",
]
session-client = ["hopr-api/node-session-client"]
explicit-path = ["session-client"]
session-server = ["hopr-api/node-session-server"]
transport-announce-quic = ["hopr-transport/p2p-announce-quic"]

# === utility features ===
utils_futures = []  # utility futures for async adapters
utils_parallel = [] # utility parallelization functionality

testing = [
  "session-server",
  "session-client",
  "runtime-tokio",
  "dep:hex-literal",
  "dep:rand",
  "dep:rstest",
  "dep:tokio-util",
  "dep:hopr-ticket-manager",
  "dep:hopr-transport-p2p",
  "dep:hopr-chain-connector",
  "dep:hopr-ct-full-network",
  "dep:hopr-network-graph",
  "hopr-chain-connector/testing",
  "hopr-chain-connector/runtime-tokio",
  "hopr-transport-p2p/runtime-tokio",
  "hopr-transport-p2p/transport-quic",
  "hopr-network-graph/petgraph",
  "hopr-network-graph/graph-api",
  "hopr-ticket-manager/redb",
] # testing related functionality

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
async-broadcast = { workspace = true }
backon = { workspace = true, features = ["futures-timer-sleep"] }
cfg_eval = { workspace = true, optional = true }
const_format = { workspace = true }
futures = { workspace = true }
futures-concurrency = { workspace = true }
futures-time = { workspace = true }
humantime-serde = { workspace = true, optional = true }
lazy_static = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
strum = { workspace = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
validator = { workspace = true }

hex-literal = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
rstest = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }

hopr-api = { workspace = true, features = [
  "full",
  "types-random",
  "types-keypair",
] }

hopr-utils = { workspace = true, features = [
  "network-types",
  "parallelize",
  "parallelize-rayon",
  "platform",
] }
hopr-transport = { workspace = true }

hopr-ticket-manager = { workspace = true, optional = true }
hopr-transport-p2p = { workspace = true, optional = true }
hopr-chain-connector = { workspace = true, optional = true }
hopr-ct-full-network = { workspace = true, optional = true }
hopr-network-graph = { workspace = true, optional = true }

[dev-dependencies]
anyhow = { workspace = true }
futures = { workspace = true }
insta = { workspace = true }
rand = { workspace = true }
rstest = { workspace = true }
serial_test = { workspace = true }
serde-saphyr = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }
opentelemetry-prometheus-text-exporter = { workspace = true }
opentelemetry_sdk = { workspace = true, features = [
  "metrics",
  "experimental_metrics_custom_reader",
  "testing",
] }

hopr-api = { workspace = true, features = ["types-random", "types-telemetry"] }
hopr-chain-connector = { workspace = true, features = [
  "testing",
  "runtime-tokio",
] }
hopr-ct-full-network = { workspace = true }
hopr-utils = { workspace = true, features = ["runtime-tokio"] }


[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
