[package]
name = "hopr-lib"
version = "4.0.2-rc.4"
authors = ["HOPR Association <tech@hoprnet.org>"]
edition.workspace = true
rust-version.workspace = true
description = "HOPR library containing the entire functionality importable without the HOPRd daemon"
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]


[features]
capture = ["hopr-transport/capture"]
default = []
telemetry = [
  "hopr-transport/telemetry",
  "hopr-api/types-telemetry",
  "hopr-utils/telemetry",
]
fixed-rng = ["hopr-api/types-fixed-rng"]
runtime-tokio = [
  "hopr-utils/runtime-tokio",
  "hopr-utils/network-types-runtime-tokio",
  "hopr-transport/runtime-tokio",
  "hopr-utils/parallelize-runtime-tokio",
  "dep:tokio",
]
serde = [
  "dep:cfg_eval",
  "dep:humantime-serde",
  "dep:serde",
  "dep:serde_with",
  "hopr-api/serde",
  "hopr-utils/serde",
  "hopr-transport/serde",
]
session-client = ["hopr-api/node-session-client"]
explicit-path = ["session-client"]
session-server = ["hopr-api/node-session-server"]
transport-announce-quic = ["hopr-transport/p2p-announce-quic"]

# === utility features ===
utils_futures = []  # utility futures for async adapters
utils_parallel = [] # utility parallelization functionality

testing = [
  "session-server",
  "session-client",
  "dep:tokio",
] # testing related functionality

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
async-broadcast = { workspace = true }
backon = { workspace = true, features = ["futures-timer-sleep"] }
cfg_eval = { workspace = true, optional = true }
const_format = { workspace = true }
futures = { workspace = true }
futures-concurrency = { workspace = true }
futures-time = { workspace = true }
humantime-serde = { workspace = true, optional = true }
lazy_static = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
strum = { workspace = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = [
  "full",
  "types-random",
  "types-keypair",
] }

hopr-utils = { workspace = true, features = [
  "network-types",
  "parallelize",
  "parallelize-rayon",
  "platform",
] }
hopr-transport = { workspace = true }

[dev-dependencies]
hopr-utils = { workspace = true, features = ["runtime-tokio"] }
insta = { workspace = true }
opentelemetry-prometheus-text-exporter = { workspace = true }
opentelemetry_sdk = { workspace = true, features = [
  "metrics",
  "experimental_metrics_custom_reader",
  "testing",
] }
rstest = { workspace = true }
serde-saphyr = { workspace = true }
tokio = { workspace = true }

hopr-api = { workspace = true, features = ["types-random", "types-telemetry"] }


[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[package.metadata.cargo-shear]
ignored = ["humantime-serde"]
