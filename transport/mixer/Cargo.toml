[package]
name = "hopr-transport-mixer"
description = "Mixer functionality responsible for mixing and delaying packets with a channel-like interface"
version = "0.4.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "transport", "mixer"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "asynchronous"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]

[features]
default = []
all-benchmarks = []
telemetry = ["hopr-types/telemetry", "dep:lazy_static"]
serde = ["dep:serde", "dep:humantime-serde"]

[dependencies]
futures = { workspace = true }
futures-timer = { workspace = true }
humantime-serde = { workspace = true, optional = true }
lazy_static = { workspace = true, optional = true }
parking_lot = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

hopr-types = { workspace = true, features = ["random"] }

[dev-dependencies]
anyhow = { workspace = true }
bytesize = { workspace = true }
hopr-transport-mixer = { path = ".", version = "0.4.1", features = ["serde"] }
criterion = { workspace = true, features = ["async_futures", "async_tokio"] }
futures = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
rstest = { workspace = true }
rust-stream-ext-concurrent = { workspace = true }
tokio = { workspace = true, features = ["time"] }
[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[[bench]]
name = "mixer_throughput_bench"
harness = false
