[package]
name = "hopr-transport"
version = "0.20.1"
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Implements the main HOPR transport interface for the core library"
edition.workspace = true
rust-version.workspace = true
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = []
capture = ["dep:pcap-file"]
telemetry = ["serde", "hopr-transport-session/telemetry"]
p2p-announce-quic = []
prometheus = [
  "hopr-network-types/prometheus",
  "hopr-transport-mixer/prometheus",
  "hopr-transport-network/prometheus",
  "hopr-transport-path/prometheus",
  "hopr-transport-protocol/prometheus",
  "hopr-transport-session/prometheus",
]
runtime-tokio = [
  "hopr-async-runtime/runtime-tokio",
  "hopr-network-types/runtime-tokio",
  "hopr-transport-protocol/runtime-tokio",
  "hopr-transport-session/runtime-tokio",
]
serde = [
  "dep:serde",
  "dep:humantime-serde",
  "hopr-api/serde",
  "hopr-protocol-app/serde",
  "hopr-protocol-hopr/serde",
  "hopr-transport-protocol/serde",
]


[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
cfg-if = { workspace = true }
futures = { workspace = true }
humantime-serde = { workspace = true, optional = true }
lazy_static = { workspace = true }
moka = { workspace = true }
proc-macro-regex = { workspace = true }
pcap-file = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["types-random"] }

hopr-async-runtime = { workspace = true }
hopr-crypto-packet = { workspace = true }

hopr-network-types = { workspace = true }
hopr-protocol-app = { workspace = true }
hopr-protocol-hopr = { workspace = true }
hopr-transport-identity = { workspace = true }
hopr-transport-mixer = { workspace = true }
hopr-transport-network = { workspace = true }
hopr-transport-path = { workspace = true }
hopr-transport-probe = { workspace = true }
hopr-transport-protocol = { workspace = true }
hopr-transport-session = { workspace = true }
hopr-transport-tag-allocator = { workspace = true }

[dev-dependencies]
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }

hopr-protocol-start = { workspace = true }
hopr-protocol-session = { workspace = true, features = [
  "session-types",
  "runtime-tokio",
] }
hopr-transport-network = { workspace = true }
hopr-transport-mixer = { workspace = true }
hopr-transport-protocol = { workspace = true, features = ["runtime-tokio"] }
temp-env = { workspace = true }
tokio = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[package.metadata.cargo-shear]
ignored = ["humantime-serde", "hopr-transport-probe"]
