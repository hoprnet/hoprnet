[package]
name = "hopr-transport-protocol"
version = "1.8.2"
authors = ["HOPR Association <tech@hoprnet.org>"]
edition.workspace = true
rust-version.workspace = true
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = []
all-benchmarks = []
telemetry = ["dep:hopr-metrics", "hopr-protocol-hopr/telemetry"]
runtime-tokio = ["hopr-utils/runtime-tokio"]
serde = [
  "dep:serde",
  "dep:humantime-serde",
  "hopr-api/serde",
  "hopr-protocol-hopr/serde",
  "hopr-protocol-app/serde",
]

[dependencies]
anyhow = { workspace = true }
ahash = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
futures-time = { workspace = true }
halfbrown = { workspace = true }
humantime-serde = { workspace = true, optional = true }
lazy_static = { workspace = true }
libp2p = { workspace = true, features = ["noise", "request-response"] }
moka = { workspace = true }
rust-stream-ext-concurrent = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true, features = ["codec", "compat"] }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["network", "node", "types-random"] }

hopr-utils = { workspace = true, features = [
  "runtime-tokio",
  "network-types",
  "parallelize",
  "parallelize-rayon",
] }
hopr-crypto-packet = { workspace = true }
hopr-metrics = { optional = true, workspace = true }

hopr-protocol-hopr = { workspace = true, features = ["rayon"] }
hopr-protocol-app = { workspace = true }


[dev-dependencies]
async-trait = { workspace = true }
async_channel_io = { version = "0.3.0" }
hopr-utils = { workspace = true, features = [
  "runtime-tokio",
  "network-types",
  "testing",
] }
bytesize = { workspace = true }
criterion = { workspace = true, features = ["async_futures", "async_tokio"] }
futures-concurrency = { workspace = true }
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
rstest = { workspace = true }
serial_test = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }

hopr-api = { workspace = true, features = ["node"] }
hopr-chain-connector = { workspace = true, features = [
  "testing",
  "runtime-tokio",
] }
hopr-transport-mixer = { workspace = true }
hopr-ticket-manager = { workspace = true }
hopr-transport-protocol = { path = ".", features = ["serde"] }

[[bench]]
name = "protocol_throughput_emulated_bench"
harness = false

[[bench]]
name = "pipeline_e2e_bench"
harness = false

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[package.metadata.cargo-shear]
ignored = ["humantime-serde"]
