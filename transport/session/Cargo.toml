[package]
name = "hopr-transport-session"
description = "Session functionality providing session abstraction over the HOPR transport"
version = "0.23.2"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "transport", "session"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "asynchronous"]
authors.workspace = true
rust-version.workspace = true
include = [
  "README.md",
  "src/**/*.rs",
  "benches/**/*.rs",
  "Cargo.toml",
  "LICENSE",
]

[lib]
crate-type = ["rlib"]

[features]
default = []
all-benchmarks = []
benchmark = []
runtime-tokio = [
  "crossfire/tokio",
  "hopr-utils/network-types-runtime-tokio",
  "hopr-protocol-session/runtime-tokio",
  "dep:tokio",
]
telemetry = [
  "hopr-utils/network-types-telemetry",
  "hopr-protocol-session/telemetry",
  "hopr-api/types-telemetry",
  "dep:lazy_static",
]
allocator-mimalloc = [
  "dep:mimalloc",
] # Use mimalloc as the global allocator on Linux
allocator-jemalloc = [
  "dep:tikv-jemallocator",
] # Use jemalloc as the global allocator on Linux

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
crossfire = { workspace = true }
flagset = { workspace = true, features = ["serde"] }
futures = { workspace = true }
humantime-serde = { workspace = true }
futures-time = { workspace = true }
lazy_static = { workspace = true, optional = true }
moka = { workspace = true }
parking_lot = { workspace = true }
pid = { workspace = true }
pin-project = { workspace = true }
serde = { workspace = true }
serde_repr = { workspace = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, optional = true }

hopr-api = { workspace = true, features = ["types-random"] }
hopr-utils = { workspace = true, features = [
  "network-types",
  "network-types-serde",
] }
hopr-crypto-packet = { workspace = true }
hopr-protocol-app = { workspace = true, features = ["serde"] }
hopr-protocol-session = { workspace = true, features = ["serde", "hashbrown"] }
hopr-protocol-start = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
hopr-api = { workspace = true, features = ["types-random"] }
hopr-utils = { workspace = true, features = [
  "runtime-tokio",
  "network-types",
  "network-types-runtime-tokio",
  "network-types-serde",
] }
hopr-protocol-session = { workspace = true, features = [
  "session-types",
  "serde",
  "runtime-tokio",
  "hashbrown",
] }
insta = { workspace = true, features = ["yaml"] }
mockall = { workspace = true }
rand = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["serde_with", "humantime-serde"]

[[bench]]
name = "session_bench"
harness = false
required-features = ["benchmark"]

[[bench]]
name = "dispatch_bench"
harness = false
required-features = ["benchmark"]

# Target-specific dependencies for memory allocators
[target.'cfg(target_os = "linux")'.dependencies]
mimalloc = { workspace = true, optional = true }
tikv-jemallocator = { workspace = true, optional = true }
