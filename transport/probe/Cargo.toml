[package]
name = "hopr-transport-probe"
version = "0.8.0"
description = "Probing mechanism of the discovered network topology"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "transport", "probing"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]

[features]
default = []
runtime-tokio = ["hopr-utils/runtime-tokio"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
crossfire = { workspace = true }
futures = { workspace = true }
futures-concurrency = { workspace = true }
const-hex = { workspace = true }
moka = { workspace = true, features = ["future"] }
rand = { workspace = true, features = ["std"] }
serde = { workspace = true }
humantime-serde = { workspace = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["ct", "types-random", "graph"] }

hopr-utils = { workspace = true, features = ["runtime-tokio", "platform"] }
hopr-protocol-app = { workspace = true }
hopr-transport-tag-allocator = { workspace = true }

[dev-dependencies]
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
lazy_static = { workspace = true }
more-asserts = { workspace = true }
rstest = { workspace = true }
tokio = { workspace = true }

hopr-utils = { workspace = true, features = ["runtime-tokio"] }
hopr-crypto-packet = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
