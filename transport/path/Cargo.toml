[package]
name = "hopr-transport-path"
version = "0.1.0"
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Graph-based path planning and selection for the HOPR transport layer"
edition = "2024"
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = []
prometheus = ["dep:hopr-metrics", "hopr-network-types/prometheus"]
runtime-tokio = ["dep:tokio"]

[dependencies]
anyhow = { workspace = true }
futures = { workspace = true }
lazy_static = { workspace = true }
moka = { workspace = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

hopr-api = { workspace = true, features = ["chain", "graph"] }
hopr-crypto-packet = { workspace = true }
hopr-crypto-random = { workspace = true }
hopr-crypto-types = { workspace = true }
hopr-internal-types = { workspace = true }
hopr-network-types = { workspace = true }
hopr-primitive-types = { workspace = true }
hopr-protocol-hopr = { workspace = true }

hopr-metrics = { workspace = true, optional = true }

[dev-dependencies]
async-trait = { workspace = true }
bimap = { workspace = true }
futures = { workspace = true }
hex-literal = { workspace = true }
tokio = { workspace = true }

hopr-network-graph = { workspace = true }
hopr-crypto-types = { workspace = true }
hopr-protocol-hopr = { workspace = true }
