[advisories]
ignore = [
  "RUSTSEC-2024-0436", # 'paste' dependency in 'libp2p' [unmaintained]
  "RUSTSEC-2024-0388", # 'derivative' in 'alloy' [unmaintained],
  "RUSTSEC-2025-0073", # 'alloy-dyn-abi' in 'alloy' - will be removed in 4.0
  "RUSTSEC-2025-0137", # `alloy` - held back until removed, see https://github.com/hoprnet/hoprnet/issues/7707
  "RUSTSEC-2026-0049", # `rustls-webpki` - needs alloy removal
  "RUSTSEC-2026-0097", # workspace already pins `rand` 0.10.1, but Cargo.lock still contains transitive `rand` 0.9.3; remove this ignore once upstream deps stop pulling 0.9.3
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
path = "~/.cargo/advisory-db"
url = "https://github.com/RustSec/advisory-db.git"
fetch = true
stale = false

[output]
deny = ["warnings"]
format = "terminal" # "terminal" (human readable report) or "json"
quiet = false       # Only print information on error
show_tree = true    # Show inverse dependency trees along with advisories (default: true)

[target]
arch = [
  "x86_64",
  "aarch64",
] # Ignore advisories for CPU architectures other than these
os = [
  "linux",
  "windows",
  "macos",
] # Ignore advisories for operating systems other than these

[yanked]
# Disabled: `core2` 0.4.0 is yanked but hard-pinned by `multihash` 0.19.3 → `libp2p-identity` 0.2.13 (latest).
# cargo-audit has no per-crate yanked ignore; re-enable once libp2p drops the core2 dependency.
enabled = false
update_index = true # Auto-update the crates.io index (default: true)
