[advisories]
ignore = [
  "RUSTSEC-2024-0436", # 'paste' dependency in 'libp2p' [unmaintained]
  "RUSTSEC-2024-0388", # 'derivative' in 'alloy' [unmaintained],
  "RUSTSEC-2025-0073", # 'alloy-dyn-abi' in 'alloy' - will be removed in 4.0
  "RUSTSEC-2025-0137", # `alloy` - held back until removed, see https://github.com/hoprnet/hoprnet/issues/7707
  "RUSTSEC-2026-0049", # `rustls-webpki` - needs alloy removal
  "RUSTSEC-2026-0097", # workspace already pins `rand` 0.10.1, but Cargo.lock still contains transitive `rand` 0.9.3; remove this ignore once upstream deps stop pulling 0.9.3
  "RUSTSEC-2026-0098", # `rustls-webpki` 0.101.7 pulled transitively by blokli-client -> eventsource-client 0.16.2 -> hyper-rustls 0.24.2; our own `rustls-webpki` bumped to >=0.103.12 in Cargo.lock. Drop once blokli-client upgrades eventsource-client (see https://github.com/hoprnet/blokli/issues/107)
  "RUSTSEC-2026-0118", # `hickory-proto` 0.25.2 pulled by libp2p-dns 0.44.0 -> libp2p 0.56.0; no fix for 0.25.x; cannot remove without a major libp2p bump
  "RUSTSEC-2026-0119", # same root cause as 0118 (different advisory DB version); hickory-proto 0.26.x is fixed via hickory-proto 0.26.1
  "RUSTSEC-2026-0173", # `proc-macro-error2` unmaintained; pulled by validator_derive -> validator -> hopr-transport-tag-allocator; drop once validator upgrades or is replaced
  "RUSTSEC-2026-0185", # needs libp2p-quic and reqwest patch
  "RUSTSEC-2026-0194", # quick-xml 0.26.0 via pprof → inferno; pprof is dev-only (profiling feature); not reachable in production
  "RUSTSEC-2026-0195", # quick-xml 0.26.0 via pprof → inferno; same root cause as 0194 (different advisory DB entry); dev-only
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
path = "~/.cargo/advisory-db"
url = "https://github.com/RustSec/advisory-db.git"
fetch = true
stale = false

[output]
# TODO: restore `deny = ["warnings"]` once `core2` (yanked, transitive via libp2p's multihash) is resolved upstream.
# cargo-audit has no per-package yanked ignore — see https://github.com/rustsec/rustsec/issues/1453
deny = ["unmaintained", "unsound"]
format = "terminal"                # "terminal" (human readable report) or "json"
quiet = false                      # Only print information on error
show_tree = true                   # Show inverse dependency trees along with advisories (default: true)

[target]
arch = [
  "x86_64",
  "aarch64",
] # Ignore advisories for CPU architectures other than these
os = [
  "linux",
  "windows",
  "macos",
] # Ignore advisories for operating systems other than these

[yanked]
# Disabled: `core2` 0.4.0 is yanked but hard-pinned by `multihash` 0.19.3 → `libp2p-identity` 0.2.13 (latest).
# cargo-audit has no per-crate yanked ignore; re-enable once libp2p drops the core2 dependency.
enabled = false
update_index = true # Auto-update the crates.io index (default: true)
