[package]
name = "hopr-crypto-sphinx"
version = "0.12.1"
description = "Implements Sphinx packet format for the HOPR protocol"
authors = ["HOPR Association <tech@hoprnet.org>"]
edition.workspace = true
rust-version.workspace = true
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = ["x25519", "ed25519"]
secp256k1 = []
ed25519 = []
x25519 = []
serde = [
  "dep:serde",
  "dep:serde_bytes",
  "generic-array/serde",
  "elliptic-curve/serde",
  "curve25519-dalek/serde",
  "k256/serde",
  "hopr-types/serde",
]

[dependencies]
bimap = { workspace = true }
curve25519-dalek = { workspace = true }
elliptic-curve = "0.13.8"
generic-array = { workspace = true }
k256 = { workspace = true, features = ["arithmetic", "ecdh", "hash2curve"] }
serde = { workspace = true, optional = true }
serde_bytes = { workspace = true, optional = true }
subtle = { workspace = true }
thiserror = { workspace = true }
typenum = { workspace = true }

hopr-types = { workspace = true, features = ["crypto", "random", "primitive"] }

[dev-dependencies]
anyhow = { workspace = true }
postcard = { workspace = true }
hex = { workspace = true }
parameterized = { workspace = true }
subtle = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["serde_bytes"]

[package.metadata.cargo-shear]
ignored = ["serde_bytes"]
