[package]
name = "hopr-protocol-session"
description = "Contains implementation of Session protocol according to HOPR RFC-0008"
version = "1.2.3"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "protocol", "session"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "asynchronous"]
authors.workspace = true
rust-version.workspace = true
include = [
  "README.md",
  "src/**/*.rs",
  "benches/**/*.rs",
  "examples/**/*.rs",
  "Cargo.toml",
  "LICENSE",
]

[features]
default = ["hashbrown"]
all-benchmarks = []
serde = ["dep:serde", "dep:serde_bytes", "hopr-crypto-packet/serde"]
telemetry = ["dep:auto_impl", "hopr-types/telemetry", "dep:lazy_static"]
runtime-tokio = ["dep:tokio", "hopr-utils/runtime-tokio"]
hashbrown = ["dep:hashbrown"]
session-types = []

allocator-mimalloc = [
  "dep:mimalloc",
] # Use mimalloc as the global allocator on Linux
allocator-jemalloc = [
  "dep:tikv-jemallocator",
] # Use jemalloc as the global allocator on Linux

[dependencies]
aquamarine = { workspace = true }
asynchronous-codec = { workspace = true }
auto_impl = { workspace = true, optional = true }
bitvec = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
futures-concurrency = { workspace = true }
futures-time = { workspace = true }
hashbrown = { workspace = true, optional = true }
lazy_static = { workspace = true, optional = true }
pin-project = { workspace = true }
parking_lot = { workspace = true }
ringbuffer = { workspace = true }
serde = { workspace = true, optional = true }
serde_bytes = { workspace = true, optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

hopr-utils = { workspace = true, features = ["runtime-tokio", "network-types"] }
hopr-crypto-packet = { workspace = true }
hopr-types = { workspace = true, features = ["primitive", "random"] }

[dev-dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
criterion = { workspace = true }
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
indexmap = { workspace = true, features = ["serde"] }
mockall = { workspace = true }
parameterized = { workspace = true }
serde = { workspace = true }
rand = { workspace = true }
rand_distr = { workspace = true }
test-log = { workspace = true, features = ["trace"] }
tokio = { workspace = true, features = ["io-util", "io-std", "net", "signal"] }
tokio-util = { workspace = true }

hopr-utils = { workspace = true, features = [
  "runtime-tokio",
  "network-types",
  "network-types-capture",
  "network-types-runtime-tokio",
] }
hopr-protocol-app = { workspace = true }

[[example]]
name = "session-socket"
path = "examples/session_socket.rs"
required-features = ["runtime-tokio"]

[[bench]]
name = "socket_bench"
harness = false

# Target-specific dependencies for memory allocators
[target.'cfg(target_os = "linux")'.dependencies]
mimalloc = { workspace = true, optional = true }
tikv-jemallocator = { workspace = true, optional = true }

[lib]
doctest = false

[package.metadata.cargo-machete]
ignored = ["serde_bytes"]

[package.metadata.cargo-shear]
ignored = ["serde_bytes"]
