[package]
name = "hopr-protocol-hopr"
version = "4.6.0"
edition.workspace = true
rust-version.workspace = true
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Contains implementation of the HOPR protocol as specified in RFC-0004 & RFC-0005"
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[features]
default = ["rayon"]
all-benchmarks = []
rayon = ["hopr-crypto-packet/rayon", "hopr-utils/parallelize-rayon"]
serde = [
  "dep:cfg_eval",
  "dep:humantime-serde",
  "dep:serde",
  "dep:serde_with",
  "hopr-api/serde",
]
telemetry = ["dep:hopr-metrics", "hopr-utils/parallelize-telemetry"]
trace-timing = ["hopr-utils/platform-trace-timing"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
auto_impl = { workspace = true }
bytes = { workspace = true }
cfg_eval = { workspace = true, optional = true }
bloomfilter = { workspace = true }
hex = { workspace = true }
lazy_static = { workspace = true }
moka = { workspace = true }
parking_lot = { workspace = true }
ringbuffer = { workspace = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
humantime-serde = { workspace = true, optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["chain", "types-random", "tickets"] }
hopr-crypto-packet = { workspace = true }
hopr-metrics = { workspace = true, optional = true }
hopr-utils = { workspace = true, features = ["parallelize", "platform"] }
hopr-ticket-manager = { workspace = true }

[dev-dependencies]
criterion = { workspace = true, features = ["async_futures", "async_tokio"] }
hex-literal = { workspace = true }
lazy_static = { workspace = true }
parameterized = { workspace = true }
tokio = { workspace = true }

hopr-chain-connector = { workspace = true, features = [
  "testing",
  "runtime-tokio",
] }


[[bench]]
name = "bloom_filter_bench"
harness = false

[[bench]]
name = "codec_bench"
harness = false

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[package.metadata.cargo-shear]
ignored = ["humantime-serde"]
