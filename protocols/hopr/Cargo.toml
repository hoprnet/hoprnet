[package]
name = "hopr-protocol-hopr"
version = "4.8.0"
description = "Contains implementation of the HOPR protocol as specified in RFC-0004 & RFC-0005"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "protocol", "routing", "mixnet"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "cryptography"]
authors.workspace = true
rust-version.workspace = true
include = [
  "README.md",
  "src/**/*.rs",
  "benches/**/*.rs",
  "Cargo.toml",
  "LICENSE",
]

[features]
default = ["rayon"]
all-benchmarks = []
rayon = ["hopr-crypto-packet/rayon", "hopr-utils/parallelize-rayon"]
serde = [
  "dep:cfg_eval",
  "dep:humantime-serde",
  "dep:serde",
  "dep:serde_with",
  "hopr-api/serde",
]
telemetry = ["hopr-api/types-telemetry", "hopr-utils/parallelize-telemetry"]
trace-timing = ["hopr-utils/platform-trace-timing"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
auto_impl = { workspace = true }
bytes = { workspace = true }
cfg_eval = { workspace = true, optional = true }
bloomfilter = { workspace = true }
const-hex = { workspace = true }
lazy_static = { workspace = true }
moka = { workspace = true }
parking_lot = { workspace = true }
ringbuffer = { workspace = true }
serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
humantime-serde = { workspace = true, optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["chain", "types-random", "tickets"] }
hopr-crypto-packet = { workspace = true }
hopr-protocol-pix = { workspace = true }
hopr-utils = { workspace = true, features = ["parallelize", "platform"] }
hopr-ticket-manager = { workspace = true }

[dev-dependencies]
criterion = { workspace = true, features = ["async_futures", "async_tokio"] }
hex-literal = { workspace = true }
lazy_static = { workspace = true }
parameterized = { workspace = true }
tokio = { workspace = true }
test-log = { workspace = true }

hopr-chain-connector = { workspace = true, features = [
  "testing",
  "runtime-tokio",
] }


[[bench]]
name = "bloom_filter_bench"
harness = false

[[bench]]
name = "codec_bench"
harness = false

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
