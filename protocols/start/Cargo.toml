[package]
name = "hopr-protocol-start"
version = "1.2.0"
description = "Contains implementation of Start protocol for Session initiation according to HOPR RFC-0009"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "protocol", "session"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[dependencies]
aquamarine = { workspace = true }
flagset = { workspace = true }
serde = { workspace = true }
serde_cbor_2 = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }

hopr-protocol-app = { workspace = true }
hopr-crypto-packet = { workspace = true }
hopr-protocol-pix = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
hopr-crypto-packet = { workspace = true }
hopr-types = { workspace = true, features = ["crypto"] }

[lib]
doctest = false
