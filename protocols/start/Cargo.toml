[package]
name = "hopr-protocol-start"
version = "1.2.0"
edition.workspace = true
rust-version.workspace = true
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Contains implementation of Start protocol for Session initiation according to HOPR RFC-0012"
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[dependencies]
aquamarine = { workspace = true }
flagset = { workspace = true }
serde = { workspace = true }
serde_cbor_2 = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }

hopr-protocol-app = { workspace = true }
hopr-crypto-packet = { workspace = true }
hopr-protocol-pix = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
generic-array = "0.14"
hopr-crypto-packet = { workspace = true }
hopr-types = { workspace = true, features = ["crypto"] }
