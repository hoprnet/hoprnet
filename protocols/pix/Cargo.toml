[package]
name = "hopr-protocol-pix"
version = "0.1.0"
description = "Protocol for Incentivizing eXit nodes (PIX) as specified in HOPR RFC-0012"
rust-version.workspace = true
authors.workspace = true
edition.workspace = true

[features]
default = ["rayon"]
rayon = ["hopr-parallelize/rayon"]
serde = ["dep:serde"]

[dependencies]
ahash = { workspace = true }
digest = "0.10" # TODO: remove once HashMarker is available in hopr-types and compatible with hopr-api
moka = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true, optional = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
validator = { workspace = true }
vsss-rs = { workspace = true, features = [
  "alloc",
  "std",
], default-features = false }

hopr-parallelize = { workspace = true }
hopr-types = { workspace = true, features = ["random", "primitive", "crypto"] }

[dev-dependencies]
anyhow = { workspace = true }
criterion = { workspace = true }
k256 = { workspace = true }
sha3 = "0.10"

[[bench]]
name = "ssa_generator"
harness = false
