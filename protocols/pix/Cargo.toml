[package]
name = "hopr-protocol-pix"
version = "0.1.0"
description = "Protocol for Incentivizing eXit nodes (PIX) as specified in HOPR RFC-0012"
license = "GPL-3.0-only"
rust-version.workspace = true
authors.workspace = true
edition.workspace = true

[features]
default = ["rayon"]
rayon = ["hopr-utils/parallelize-rayon"]
serde = ["dep:serde", "vsss-rs/serde", "hopr-types/serde"]

[dependencies]
ahash = { workspace = true }
auto_impl = { workspace = true }
async-broadcast = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
moka = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true, optional = true }
smart-default = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }
vsss-rs = { workspace = true, features = [
  "alloc",
  "std",
], default-features = false }

hopr-utils = { workspace = true }
hopr-types = { workspace = true, features = ["random", "primitive", "crypto"] }

[dev-dependencies]
anyhow = { workspace = true }
criterion = { workspace = true }
k256 = { workspace = true }
futures-time = { workspace = true }
rand = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }

[[bench]]
name = "ssa_generator_bench"
harness = false
