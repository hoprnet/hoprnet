[package]
name = "hopr-protocol-app"
description = "Contains implementation of Application layer for HOPR protocol as specified in RFC-0011"
version = "1.0.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "protocol", "application"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[features]
default = []
serde = ["dep:serde", "dep:serde_bytes", "hopr-crypto-packet/serde"]

[dependencies]
strum = { workspace = true }
serde = { workspace = true, optional = true }
serde_bytes = { workspace = true, optional = true }
thiserror = { workspace = true }

hopr-crypto-packet = { workspace = true }
hopr-types = { workspace = true, features = ["primitive"] }

[dev-dependencies]
anyhow = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["serde_bytes"]
