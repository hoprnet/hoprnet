[package]
name = "hopr-ticket-manager"
version = "0.1.0"
description = "Manages outgoing ticket indices and incoming redeemable tickets"
rust-version.workspace = true
authors.workspace = true
edition.workspace = true

[features]
default = ["redb"]
redb = ["dep:postcard", "dep:redb", "dep:serde", "hopr-api/serde"]
runtime-tokio = ["hopr-async-runtime/runtime-tokio"]

[dependencies]
anyhow = { workspace = true }
auto_impl = { workspace = true }
dashmap = { workspace = true, features = ["inline"] }
hashbrown = { workspace = true, features = ["inline-more"] }
futures = { workspace = true }
futures-time = { workspace = true }
parking_lot = { workspace = true, features = ["arc_lock"] }
redb = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
postcard = { workspace = true, optional = true, features = ["use-std"] }
thiserror = { workspace = true }
tracing = { workspace = true }

hopr-api = { workspace = true, features = [
  "db",
  "chain",
  "types-internal",
  "types-random",
] }
hopr-async-runtime = { workspace = true }

[dev-dependencies]
hopr-async-runtime = { workspace = true, features = ["runtime-tokio"] }
rand = { workspace = true }
