---
coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 0.5%
        if_not_found: success
    patch:
      default:
        target: auto
        threshold: 0%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: yes
  require_head: yes

ignore:
  - ".cargo/**"
  - ".ci/**"
  - ".claude/**"
  - ".github/**"
  - ".processes/**"
  - "localcluster/**"
  - "common/test-stubs/**"
  - "utils/src/testing/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
  - "**/codegen/**"
  - "hopr/hopr-lib/src/testing/loadgen.rs"
  - "hopr/reference/src/testing/**"
  # Non-Rust directories (Python SDK, shell scripts, tools, deployment manifests, docs)
  - "sdk/**"
  - "scripts/**"
  - "tools/**"
  - "deploy/**"
  - "docs/**"

flags:
  unit:
    carryforward: true
  integration:
    carryforward: true
