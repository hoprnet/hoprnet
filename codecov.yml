---
coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        # Raised from 0.5% to accommodate one-time path-rename coverage loss
        # from workspace consolidation (transport/api→transport/hopr etc.).
        # Integration coverage will restore the baseline after merge.
        threshold: 6.5%
        if_not_found: success
    patch:
      default:
        target: auto
        threshold: 6%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: yes
  require_head: yes

ignore:
  - ".cargo/**"
  - ".ci/**"
  - ".claude/**"
  - ".github/**"
  - ".processes/**"
  - "localcluster/**"
  - "common/test-stubs/**"
  - "utils/src/testing/**"
  - "**/benches/**"
  - "**/build.rs"
  - "**/codegen/**"
  - "hopr/reference/src/testing/**"
  # Non-Rust directories (Python SDK, shell scripts, tools, deployment manifests, docs)
  - "sdk/**"
  - "scripts/**"
  - "tools/**"
  - "deploy/**"
  - "docs/**"

flags:
  unit:
    carryforward: true
  integration:
    carryforward: true
