---
#################################################################################
# Code coverage reporting — runs on master (baseline) and non-draft PRs
#################################################################################
name: Code Coverage

env:
  RUST_BACKTRACE: "1"

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-code-coverage
  cancel-in-progress: true

jobs:
  unit-coverage:
    name: Unit Coverage
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 60
    if: github.event_name == 'push' || (github.event.pull_request.draft == false)
    env:
      CI: "true"
    steps:
      - name: Generate unit coverage report
        uses: hoprnet/hopr-workflows/actions/nix-action@04bef49c02b8d5407a49dc1de42d08e727086180 # nix-action-v1
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          use_cachix: "true"
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: |
            nix build -L .#hopr-coverage
            cp result coverage-unit.lcov

      - name: Upload unit coverage report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          files: coverage-unit.lcov
          flags: unit
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-coverage:
    name: Integration Coverage
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 60
    if: github.event_name == 'push' || (github.event.pull_request.draft == false)
    env:
      CI: "true"
    steps:
      - name: Generate integration coverage report
        uses: hoprnet/hopr-workflows/actions/nix-action@04bef49c02b8d5407a49dc1de42d08e727086180 # nix-action-v1
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          use_cachix: "true"
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: |
            nix develop .#coverage -c cargo llvm-cov \
              --workspace \
              --test '*' \
              --lcov --output-path integration-coverage.lcov \
              -- --test-threads=1

      - name: Upload integration coverage report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          files: integration-coverage.lcov
          flags: integration
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
