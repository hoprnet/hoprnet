---
#################################################################################
# Code coverage reporting — runs on master (baseline) and non-draft PRs
#################################################################################
name: Code Coverage

env:
  RUST_BACKTRACE: "1"

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-code-coverage
  cancel-in-progress: true

jobs:
  coverage:
    name: ${{ matrix.name }}
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 60
    if: github.event_name == 'push' || (github.event.pull_request.draft == false)
    env:
      CI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit Coverage
            command: |
              nix build -L .#hopr-coverage
              cp result coverage.lcov
            coverage_file: coverage.lcov
            flag: unit
          - name: Integration Coverage
            command: |
              nix develop .#coverage -c cargo llvm-cov \
                --workspace \
                --test '*' \
                --lcov --output-path coverage.lcov \
                -- --test-threads=1
            coverage_file: coverage.lcov
            flag: integration
    steps:
      - name: Generate ${{ matrix.name }} report
        uses: hoprnet/hopr-workflows/actions/nix-action@nix-action-v1
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: ${{ matrix.command }}

      - name: Upload ${{ matrix.name }} report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
