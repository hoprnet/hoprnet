---
name: Pre-commit

on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-pre-commit
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: self-hosted-hoprnet-small
    steps:
      - name: Run Pre-commit
        uses: hoprnet/hopr-workflows/actions/nix-action@04bef49c02b8d5407a49dc1de42d08e727086180 # nix-action-v1
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          use_cachix: "true"
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          command: nix build -L .#pre-commit-check
