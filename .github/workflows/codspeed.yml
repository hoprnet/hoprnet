---
name: CodSpeed

on:
  # Pull Request but ONLY if specific label is added
  pull_request:
    types:
      - labeled
      - synchronize
  # Nightly run
  schedule:
    - cron: '0 2 * * *'
  # On-demand run
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Run Benchmarks
    runs-on: self-hosted-hoprnet-bigger
    # Condition: 
    # 1. Not a PR (it's push/schedule/dispatch) 
    # 2. OR it's a PR and has the 'perf:benchmark' label
    if: |
      github.event_name != 'pull_request' || 
      contains(github.event.pull_request.labels.*.name, 'perf:benchmark')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build benchmarks
        run: nix develop .#ci -c cargo codspeed build

      - name: Install CodSpeed Runner
        run: |
          curl -fsSL https://codspeed.io/install.sh | bash
          echo "$HOME/.codspeed/bin" >> $GITHUB_PATH

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: nix develop .#ci -c cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
