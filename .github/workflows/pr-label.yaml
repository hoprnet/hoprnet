---
#################################################################################
# Label-triggered PR jobs
#
# Additive to pr.yaml — runs only on label events, never interferes with
# the main pipeline's required status checks.
#################################################################################
name: PR Label

on:
  pull_request:
    types:
      - labeled

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-pr-label
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-candidate:
    name: Build Candidate
    if: github.event.label.name == 'build:candidate'
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 20
    steps:
      - name: Build candidate binary
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: nix build -L .#hoprd-candidate
