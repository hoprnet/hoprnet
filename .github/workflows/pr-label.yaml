---
#################################################################################
# Label-triggered PR jobs
#
# Additive to pr.yaml — runs only on label events, never interferes with
# the main pipeline's required status checks.
#################################################################################
name: PR Label

on:
  pull_request:
    types:
      - labeled

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-pr-label
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-candidate:
    name: Build Candidate
    if: github.event.label.name == 'build:candidate'
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 20
    steps:
      - name: Build candidate binary
        uses: hoprnet/hopr-workflows/actions/nix-action@ade4bbd75f7204255c61d19c23f67d3da221e7d2 # nix-action-v1
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: nix build -L .#binary-ticket-inspector

  build-dappnode:
    strategy:
      fail-fast: false
      matrix:
        dappnode_repository:
          - DAppNodePackage-Hopr
          - DAppNodePackage-Hopr-testnet
    name: ${{ matrix.dappnode_repository }}
    uses: ./.github/workflows/build-dappnode.yaml
    with:
      source_repo: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      dappnode_repository: ${{ matrix.dappnode_repository }}
      labels: ${{ format('{0},', join(github.event.pull_request.labels.*.name, ',')) }}
    secrets:
      GH_RUNNER_TOKEN: ${{ secrets.GH_RUNNER_TOKEN }}

  benchmarks:
    name: Benchmarks
    if: github.event.label.name == 'perf:benchmark' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: hoprnet/hopr-workflows/.github/workflows/benchmarks.yaml@13489274cf2d23929227fcd62bb8ac2341615b3e # workflow-benchmark-v2
    with:
      source_branch: ${{ github.event.pull_request.head.ref }}
      runner: self-hosted-hoprnet-bigger
      bencher_project: ${{ github.event.repository.name }}
      # Benchmarks disabled for now — flip these two booleans back to re-enable.
      should_build: false
      should_run: false
      build_command: "nix build -L .#bench-build"
      run_command: "nix run .#bench-run"
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      bencher_api_token: ${{ secrets.BENCHER_API_TOKEN }}
      ZULIP_API_KEY: ${{ secrets.ZULIP_API_KEY }}
      ZULIP_EMAIL: ${{ secrets.ZULIP_EMAIL }}
