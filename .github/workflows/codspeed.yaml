---
name: CodSpeed

on:
  push:
    branches:
      - "master"
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.head_ref || github.ref_name }}-codspeed
  cancel-in-progress: true

jobs:
  codspeed:
    name: Benchmarks
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 60
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: false
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: hoprnet/hopr-workflows/actions/setup-nix@setup-nix-v1
        with:
          cachix_cache_name: hoprnet
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build the benchmark targets
        run: |
          nix develop -c bash -c '\
            cargo install cargo-codspeed && \
            cargo codspeed build \
              -p hopr-crypto-packet \
              -p hopr-network-graph \
              -p hopr-transport-mixer \
              -p hopr-protocol-session \
              -p hopr-transport-session'

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@fc9e362522e1a09af163f1cbd74e243909f06b46 # v4
        with:
          mode: simulation
          run: nix develop -c cargo codspeed run
