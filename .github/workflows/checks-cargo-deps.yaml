---
name: Cargo redundant deps

env:
  RUST_BACKTRACE: "1"

on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string

concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-cargo-redundant-deps
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-unused-dependencies:
    name: Redundant cargo dependencies
    runs-on: self-hosted-hoprnet-bigger
    timeout-minutes: 10
    steps:
      - name: Check cargo deps
        uses: hoprnet/hopr-workflows/actions/nix-action@nix-action-v1
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          use_cachix: "true"
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: |
            nix develop .#ci --command cargo machete
            nix develop .#ci --command cargo shear
