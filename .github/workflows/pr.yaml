---
################################################################################
# Pull request pipeline for hoprnet
#
# Single orchestrator: dispatches checks, tests, builds, and dappnode.
################################################################################
name: PR

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-pr
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate title
    if: github.event_name == 'pull_request'
    runs-on: depot-ubuntu-24.04
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            build
            chore
            docs
            style
            refactor
            perf
            test
          requireScope: false
          ignoreLabels: |
            bot
            ignore-semantic-pull-request

  label:
    name: Add labels
    if: github.event_name == 'pull_request'
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/labeler@77a4082b841706ac431479b7e2bb11216ffef250 # main on 20.02.2025
        with:
          sync-labels: true

      - name: Add "external" label for forked PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REPO: ${{ github.repository }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$HEAD_REPO" != "$BASE_REPO" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "external"
          fi

  check-allowed-dependencies:
    name: Disallowed git dependencies in cargo
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Cargo dependencies
        run: |
          nix develop -c env -u VIRTUAL_ENV UV_CACHE_DIR=.ci/no-git-dependencies/.uv-cache \
            uv run --project .ci/no-git-dependencies \
            python .ci/no-git-dependencies/src/no_git_dependencies_check/main.py \
            --allow blokli-client

  checks:
    name: Check
    uses: hoprnet/hopr-workflows/.github/workflows/checks.yaml@bbd22e57cf954c15f0a6051d59329857809141dd # workflow-checks-v1
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      runner_small: depot-ubuntu-24.04
      runner_large: depot-ubuntu-24.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  tests:
    name: Test
    uses: hoprnet/hopr-workflows/.github/workflows/tests.yaml@68c55f5bd5bd5a74a92b03f7cd72970f862894d0 # workflow-tests-v4
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      enable_unit_tests: true
      enable_integration_tests: true
      integration_test_command: "nix develop -c env NEXTEST_HIDE_PROGRESS_BAR=1 cargo nextest run --test '*' -j 1"
      enable_nightly_tests: true
      enable_benchmarks: false
      enable_unit_coverage: true
      enable_integration_coverage: true
      unit_coverage_command: |
        nix build -L .#coverage-unit
        cp result coverage.lcov
      integration_coverage_command: |
        nix develop .#coverage -c env NEXTEST_HIDE_PROGRESS_BAR=1 cargo llvm-cov nextest \
          --workspace \
          --test '*' \
          --lcov --output-path coverage.lcov \
          -j 1
      runner_unit: depot-ubuntu-24.04-16
      runner_integration: depot-ubuntu-24.04-8
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  build-binaries:
    name: Binary ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-24.04-8
            build_command: nix build -L .#binary-hoprd-x86_64-linux
            required_label: ""
          - architecture: aarch64-linux
            runner: depot-ubuntu-24.04-8
            build_command: nix build -L .#binary-hoprd-aarch64-linux
            required_label: "binary:aarch64-linux"
          - architecture: aarch64-darwin
            runner: depot-macos-15
            build_command: nix build -L .#binary-hoprd-aarch64-darwin
            required_label: binary:aarch64-darwin
          - architecture: x86_64-darwin
            runner: depot-macos-15
            build_command: nix build -L .#binary-hoprd-x86_64-darwin
            required_label: binary:x86_64-darwin
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@build-binaries-v2
    permissions:
      contents: read
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      version_type: commit
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: hoprnet
      build_file: hopr/hopr-lib/Cargo.toml
      build_command: ${{ matrix.build_command }}
      binary: hoprd
      runner: ${{ matrix.runner }}
      enabled: ${{ matrix.required_label == '' || contains(github.event.pull_request.labels.*.name, matrix.required_label) }}
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}

  build-docker:
    name: Docker
    needs: build-binaries
    uses: hoprnet/hopr-workflows/.github/workflows/build-docker.yaml@build-docker-v1
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      version_type: commit
      build_matrix: >-
        [
          {
            "runner": "depot-ubuntu-24.04-4",
            "architecture": "x86_64-linux",
            "build_command": "nix build -L .#docker-hoprd-x86_64-linux",
            "build_debug_command": "nix build -L .#docker-hoprd-dev-x86_64-linux"
          }
        ]
      cachix_cache_name: hoprnet
      build_file: hopr/hopr-lib/Cargo.toml
      docker_image_name: hoprd
      docker_image_format: skopeo
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  docs:
    name: Docs
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Build docs
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: |
            set -e
            RUSTDOCFLAGS="-D warnings" nix develop -c cargo doc --no-deps --document-private-items
            nix build -L .#docs
