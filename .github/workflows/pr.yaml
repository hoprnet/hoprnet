---
################################################################################
# Pull request pipeline for hoprnet
#
# Dispatches checks and tests concurrently.
# Build runs as a separate workflow (calls external reusable workflows).
################################################################################
name: PR

on:
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-pr
  cancel-in-progress: true

jobs:
  checks:
    name: Check
    uses: ./.github/workflows/checks.yaml
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      runner_small: self-hosted-hoprnet-small
      runner_large: self-hosted-hoprnet-bigger
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  tests:
    name: Test
    uses: ./.github/workflows/tests.yaml
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      unit_tests: true
      integration_tests: true
      nightly_tests: true
      benchmarks: true
      coverage: true
      runner: self-hosted-hoprnet-bigger
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
