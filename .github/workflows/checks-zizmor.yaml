---
name: Zizmor

on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true

concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-zizmor
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    name: Zizmor
    runs-on: self-hosted-hoprnet-bigger
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run zizmor
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          command: nix develop -L .#ci -c bash -c "zizmor --format sarif . > results.sarif"

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: results.sarif
          category: zizmor
