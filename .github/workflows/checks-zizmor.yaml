---
name: Zizmor

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/**"

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-zizmor
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    uses: hoprnet/hopr-workflows/.github/workflows/checks-zizmor.yaml@64cb8ba34ff2e8caa43e366207d0cb1faa8d43d4 # workflow-checks-zizmor-v1
    permissions:
      contents: read
      security-events: write
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      runner: depot-ubuntu-24.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
