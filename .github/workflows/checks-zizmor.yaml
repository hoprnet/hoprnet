---
name: Zizmor

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - ".github/**"
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.event.pull_request.head.ref || github.ref_name }}-zizmor
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    uses: hoprnet/hopr-workflows/.github/workflows/checks-zizmor.yaml@fb4d694390fc91360c32a48c82e4624a56f2fdff # checks-zizmor-v1
    permissions:
      contents: read
      security-events: write
    with:
      source_branch: ${{ github.event.pull_request.head.ref || github.ref }}
      runner: self-hosted-hoprnet-bigger
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
