---
name: Audit

on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string

concurrency:
  group: ${{ inputs.source_branch || github.ref_name }}-audit
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: Audit
    runs-on: self-hosted-hoprnet-bigger
    steps:
      - name: Run Audit
        uses: hoprnet/hopr-workflows/actions/nix-action@04bef49c02b8d5407a49dc1de42d08e727086180 # nix-action-v1
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          command: nix run .#audit
