---
#################################################################################
# Pipeline to build dappnode package                                            #
#################################################################################
name: Build DappNode

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
      source_branch:
        required: true
        type: string
      dappnode_repository:
        required: true
        type: string
      labels:
        required: true
        type: string
    secrets:
      GCP_SA_GITHUB_RUNNER:
        required: true
      GH_RUNNER_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      network:
        type: choice
        options:
          - rotsee
          - dufour
        required: true
        description: 'Package network (rotsee: testnet, dufour: mainnet)'
        default: rotsee

concurrency:
  group: dappnode-${{ inputs.dappnode_repository || github.event.inputs.network }}-${{ inputs.source_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    # event_name reflects the caller: 'pull_request' (from pr.yaml) or 'workflow_dispatch' (manual)
    if: >-
      github.event_name == 'workflow_dispatch' || contains(inputs.labels, format('package:{0},', inputs.dappnode_repository))
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          disable-sudo: false # sudo is needed for docker compose installation
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - name: Set environment variables
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SOURCE_REPO: ${{ inputs.source_repo }}
          INPUT_SOURCE_BRANCH: ${{ inputs.source_branch }}
          INPUT_DAPPNODE_REPOSITORY: ${{ inputs.dappnode_repository }}
          INPUT_NETWORK: ${{ github.event.inputs.network }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            echo "The workflow is triggered by other pipeline"
            echo "source_repo=${INPUT_SOURCE_REPO}" | tee -a "$GITHUB_OUTPUT"
            echo "source_branch=${INPUT_SOURCE_BRANCH}" | tee -a "$GITHUB_OUTPUT"
            echo "dappnode_repository=${INPUT_DAPPNODE_REPOSITORY}" | tee -a "$GITHUB_OUTPUT"
            if [[ "${INPUT_DAPPNODE_REPOSITORY}" == "DAppNodePackage-Hopr-testnet" ]]; then
              echo "HOPRD_NETWORK=rotsee" | tee -a "$GITHUB_OUTPUT"
            else
              echo "HOPRD_NETWORK=dufour" | tee -a "$GITHUB_OUTPUT"
            fi
          else
            echo "The workflow is triggered manually"
            echo "source_repo=${GH_REPOSITORY}" | tee -a "$GITHUB_OUTPUT"
            echo "source_branch=${GH_REF_NAME}" | tee -a "$GITHUB_OUTPUT"
            if [[ "${INPUT_NETWORK}" == "rotsee" ]]; then
              echo "dappnode_repository=DAppNodePackage-Hopr-testnet" | tee -a "$GITHUB_OUTPUT"
              echo "HOPRD_NETWORK=rotsee" | tee -a "$GITHUB_OUTPUT"
            else
              echo "dappnode_repository=DAppNodePackage-Hopr" | tee -a "$GITHUB_OUTPUT"
              echo "HOPRD_NETWORK=dufour" | tee -a "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Checkout hoprnet repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ steps.vars.outputs.source_repo }}
          ref: ${{ steps.vars.outputs.source_branch }}

      - name: Setup GCP
        id: gcp
        uses: hoprnet/hopr-workflows/actions/setup-gcp@644d936de4e1c8f5c50ba50f8526209455c28b4a # master
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          login_artifact_registry: 'false'
          install_sdk: 'true'

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20.20.0 # Revert to version 20, as the dappnode package is not yet compatible with Node 22

      - name: Checkout DAppNodePackage-Hopr
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: dappnode/${{ steps.vars.outputs.dappnode_repository }}
          path: "./dappnode"
          token: ${{ secrets.GH_RUNNER_TOKEN }}
          ref: ${{ vars.DAPPNODE_REPOSITORY_BRANCH_NAME }}

      - name: Setup variables
        id: setup
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_BRANCH: ${{ steps.vars.outputs.source_branch }}
          BRANCH_MASTER_RELEASE_NAME: ${{ vars.BRANCH_MASTER_RELEASE_NAME }}
          BRANCH_RELEASE_RELEASE_NAME: ${{ vars.BRANCH_RELEASE_RELEASE_NAME }}
        run: |
          set -x
          # Set current_version based on branch type:
          # - For PRs: <current_version>-pr.<PR_number>
          # - For 'master' branch: <master_version>-latest
          # - For 'release/*' branches: <release_version>-latest
          # - For other branches: exit with error
          current_version=$(./scripts/get-current-version.sh docker)
          if [[ -z "${PR_NUMBER}" ]]; then
            echo "Invoked manually"
            declare base_branch="${SOURCE_BRANCH}"
            if [[ "${base_branch}" == "master" ]]; then
              echo "current_version=${BRANCH_MASTER_RELEASE_NAME}-latest" >> "$GITHUB_OUTPUT"
            elif [[ "${base_branch}" =~ ^"release" ]]; then
              echo "current_version=${BRANCH_RELEASE_RELEASE_NAME}-latest" >> "$GITHUB_OUTPUT"
            else
              last_commit=$(git rev-parse --short HEAD)
              echo "current_version=${current_version}-commit.${last_commit}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Invoked from a pull request"
            echo "current_version=${current_version}-pr.${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish DappNode Package
        id: publish
        env:
          DEVELOPER_ADDRESS: "0x7305356ad936A06c4ea5DF45AD5E5C3ff9Db818E"
          DOCKER_IMAGE_REGISTRY: ${{ vars.DOCKER_IMAGE_REGISTRY }}
          CURRENT_VERSION: ${{ steps.setup.outputs.current_version }}
          SOURCE_BRANCH: ${{ steps.vars.outputs.source_branch }}
          HOPRD_NETWORK: ${{ steps.vars.outputs.HOPRD_NETWORK }}
        run: |
          docker_tag=$(gcloud artifacts docker tags list "${DOCKER_IMAGE_REGISTRY}/hoprd" --filter="tag:${CURRENT_VERSION}" --format="csv[no-heading](tag,version)" | grep -F "${CURRENT_VERSION}," | sed 's/,/@/')
          yq -i e ".services.node.build.args.UPSTREAM_VERSION |= \"${docker_tag}\"" "./docker-compose.yml"
          npm install
          npx @dappnode/dappnodesdk publish patch  --provider "remote" --upload_to "ipfs" --verbose | tee build.log

          echo "DNP (DAppNode Package) built and uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${SOURCE_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "Network: ${HOPRD_NETWORK}" >> "$GITHUB_STEP_SUMMARY"
          grep "ipfs" build.log >> "$GITHUB_STEP_SUMMARY"
          ipfs_hash=$(grep -oP 'Release hash : \K/ipfs/\w+' build.log)
          echo "ipfs_hash=$ipfs_hash" >> "$GITHUB_OUTPUT"
          echo "ipfs_hash=$ipfs_hash"
        working-directory: "./dappnode"
