---
################################################################################
# Reusable test + coverage pipeline
#
# Interface designed to match the future hopr-workflows/rust-tests.yaml.
# Tests and benchmarks run concurrently.
# Coverage runs after all tests pass.
################################################################################
name: Tests

on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      unit_tests:
        required: false
        type: boolean
        default: true
      integration_tests:
        required: false
        type: boolean
        default: false
      nightly_tests:
        required: false
        type: boolean
        default: false
      benchmarks:
        required: false
        type: boolean
        default: false
      coverage:
        required: false
        type: boolean
        default: false
      unit_test_command:
        required: false
        type: string
        default: "nix build -L .#test-unit"
      integration_test_command:
        required: false
        type: string
        default: "nix develop -c cargo test --test '*' -- --test-threads=1"
      nightly_test_command:
        required: false
        type: string
        default: "nix build -L .#test-nightly"
      benchmark_command:
        required: false
        type: string
        default: "nix build .#bench-build"
      unit_coverage_command:
        required: false
        type: string
        default: |
          nix build -L .#coverage-unit
          cp result coverage.lcov
      integration_coverage_command:
        required: false
        type: string
        default: |
          nix develop .#coverage -c cargo llvm-cov \
            --workspace \
            --test '*' \
            --lcov --output-path coverage.lcov \
            -- --test-threads=1
      runner:
        required: false
        type: string
        default: "ubuntu-latest"
      test_timeout:
        required: false
        type: number
        default: 60
      benchmark_timeout:
        required: false
        type: number
        default: 20
      coverage_timeout:
        required: false
        type: number
        default: 60
    secrets:
      cachix_auth_token:
        required: true
      codecov_token:
        required: false

env:
  RUST_BACKTRACE: "1"
  FOUNDRY_PROFILE: ci

jobs:
  # ── Tests + Benchmarks (concurrent) ────────────────────────────────────────
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.test_timeout }}
    env:
      CI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit
            enabled: ${{ inputs.unit_tests }}
            command: ${{ inputs.unit_test_command }}
          - name: Integration
            enabled: ${{ inputs.integration_tests }}
            command: ${{ inputs.integration_test_command }}
          - name: Unit Nightly
            enabled: ${{ inputs.nightly_tests }}
            command: ${{ inputs.nightly_test_command }}
    steps:
      - name: Run ${{ matrix.name }}
        if: matrix.enabled
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ matrix.command }}

  build-benchmarks:
    name: Benchmark
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.benchmark_timeout }}
    if: inputs.benchmarks && github.event_name == 'merge_group'
    steps:
      - name: Build benchmarks
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ inputs.benchmark_command }}

  # ── Coverage (after tests pass) ────────────────────────────────────────────
  coverage:
    name: Coverage / ${{ matrix.name }}
    needs: [test]
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.coverage_timeout }}
    if: inputs.coverage && (github.event_name == 'push' || (github.event.pull_request.draft == false))
    env:
      CI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit
            enabled: ${{ inputs.unit_tests }}
            command: ${{ inputs.unit_coverage_command }}
            flag: unit
          - name: Integration
            enabled: ${{ inputs.integration_tests }}
            command: ${{ inputs.integration_coverage_command }}
            flag: integration
    steps:
      - name: Generate ${{ matrix.name }} report
        if: matrix.enabled
        uses: hoprnet/hopr-workflows/actions/nix-action@c2aca7e56d25c4a786049ccf816c7f1af8721de8 # nix-action-v1
        with:
          source_branch: ${{ inputs.source_branch }}
          cachix_auth_token: ${{ secrets.cachix_auth_token }}
          command: ${{ matrix.command }}

      - name: Upload ${{ matrix.name }} report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: >-
          matrix.enabled && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          files: coverage.lcov
          flags: ${{ matrix.flag }}
          fail_ci_if_error: true
          token: ${{ secrets.codecov_token }}
