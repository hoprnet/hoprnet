---
#################################################################################
# Pipeline to package artifacts
#################################################################################
name: Package

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      branch:
        required: true
        type: string
      target:
        required: true
        type: string
      packager:
        required: true
        type: string
      extension:
        required: true
        type: string
      workflow_run_id:
        required: true
        type: string

concurrency:
  group: ${{ inputs.branch }}-package-${{ inputs.target }}-${{ inputs.packager }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  package:
    name: Package
    runs-on: ${{ inputs.runner }}
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, format('binary:{0}', inputs.target))
    steps:
      - name: Checkout hoprnet repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.branch }}

      - name: Setup GCP
        id: gcp
        uses: hoprnet/hopr-workflows/actions/setup-gcp@644d936de4e1c8f5c50ba50f8526209455c28b4a # master
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          login_artifact_registry: 'false'
          install_sdk: 'true'

      - name: Download artifacts from parent workflow run
        id: download
        run: |
          set -euo pipefail  # Enable strict error handling
          mkdir -p ./dist/bin

          # Fetch artifacts metadata
          curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPO}/actions/runs/${WORKFLOW_RUN_ID}/artifacts" \
            -o artifacts.json || { echo "Failed to fetch artifacts metadata"; exit 1; }
          mkdir -p ./dist/bin

          # Extract hopli artifact URL
          hopli_url=$(jq -r ".artifacts[] | select(.name == \"hopli-${INPUT_TARGET}\").archive_download_url" artifacts.json)
          if [[ -z "$hopli_url" ]]; then
            echo "Error: hopli artifact URL not found for target '${INPUT_TARGET}'"
            exit 1
          fi

          # Download and unzip hopli artifact
          curl -s -L -H "Authorization: Bearer ${GH_TOKEN}" "$hopli_url" -o "hopli-${INPUT_TARGET}.zip" || { echo "Failed to download hopli artifact"; exit 1; }
          unzip -o "hopli-${INPUT_TARGET}.zip" -d ./dist/bin || { echo "Failed to unzip hopli artifact"; exit 1; }

          # Extract hoprd artifact URL
          hoprd_url=$(jq -r ".artifacts[] | select(.name == \"hoprd-${INPUT_TARGET}\").archive_download_url" artifacts.json)
          if [[ -z "$hoprd_url" ]]; then
            echo "Error: hoprd artifact URL not found for target '${INPUT_TARGET}'"
            exit 1
          fi

          # Download and unzip hoprd artifact
          curl -s -L -H "Authorization: Bearer ${GH_TOKEN}" "$hoprd_url" -o "hoprd-${INPUT_TARGET}.zip" || { echo "Failed to download hoprd artifact"; exit 1; }
          unzip -o "hoprd-${INPUT_TARGET}.zip" -d ./dist/bin || { echo "Failed to unzip hoprd artifact"; exit 1; }

          current_version=$(./scripts/get-current-version.sh)
          architecture="${INPUT_TARGET}"
          # Remove suffix from architecture
          architecture=${architecture%-linux}
          echo "package_file_name=hoprd_${current_version}_${architecture}" | tee -a $GITHUB_OUTPUT
          echo "current_version=${current_version}" | tee -a $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WORKFLOW_RUN_ID: ${{ inputs.workflow_run_id }}
          INPUT_TARGET: ${{ inputs.target }}

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt install -y help2man just
          if [[ "${INPUT_TARGET}" == "x86_64-linux" ]]; then
            nfpm_url=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r '.assets[] | select(.name | endswith("amd64.deb")) | .browser_download_url')
          else
            nfpm_url=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r '.assets[] | select(.name | endswith("arm64.deb")) | .browser_download_url')
          fi
          curl -L -o nfpm.deb "$nfpm_url"
          sudo apt install -y ./nfpm.deb
        env:
          INPUT_TARGET: ${{ inputs.target }}

      - name: Create man pages
        run: |
          help2man --name="HOPR node executable" --no-info --output ./deploy/nfpm/hoprd.1 ./dist/bin/hoprd
          gzip -9n ./deploy/nfpm/hoprd.1
          help2man --name="HOPR CLI helper tool" --no-info --output ./deploy/nfpm/hopli.1 ./dist/bin/hopli
          gzip -9n ./deploy/nfpm/hopli.1

      - name: Create Changelog
        run: |
          ./scripts/generate-changelog.sh "${CURRENT_VERSION}" "${INPUT_PACKAGER}" true > ./deploy/nfpm/changelog
          if [[ "${INPUT_PACKAGER}" == "deb" ]]; then
            gzip -9 -c ./deploy/nfpm/changelog > ./deploy/nfpm/changelog.gz
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_VERSION: ${{ steps.download.outputs.current_version }}
          INPUT_PACKAGER: ${{ inputs.packager }}

      - name: Create package
        run: just package "${INPUT_PACKAGER}" "${INPUT_TARGET}"
        env:
          INPUT_PACKAGER: ${{ inputs.packager }}
          INPUT_TARGET: ${{ inputs.target }}

      - name: Create signatures
        run: just sign-file "${GITHUB_WORKSPACE}/dist/packages/hoprd-${INPUT_TARGET}.${INPUT_PACKAGER}"
        env:
          GPG_HOPRNET_PRIVATE_KEY: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_PACKAGER: ${{ inputs.packager }}

      - name: Test package
        if: vars.TEST_OS_PACKAGE_ENABLED == 'true'
        timeout-minutes: 30
        continue-on-error: true
        run: |
          echo "${HOPR_IDENTITY_FILE}" | base64 -d > "${GITHUB_WORKSPACE}/deploy/nfpm/hopr.id"
          chmod 600 "${GITHUB_WORKSPACE}/deploy/nfpm/hopr.id"
          nix develop -c just test-package "${INPUT_PACKAGER}" "${INPUT_TARGET}"
        env:
          HOPRD_PASSWORD: ${{ secrets.TEST_OS_PACKAGE_HOPRD_PASSWORD }}
          HOPRD_SAFE_ADDRESS: ${{ secrets.TEST_OS_PACKAGE_HOPRD_SAFE_ADDRESS }}
          HOPRD_MODULE_ADDRESS: ${{ secrets.TEST_OS_PACKAGE_HOPRD_MODULE_ADDRESS }}
          HOPRD_PROVIDER: ${{ secrets.TEST_OS_PACKAGE_HOPRD_PROVIDER }}
          GCP_PROJECT: ${{ secrets.GCP_SA_PROJECT }}
          HOPR_IDENTITY_FILE: ${{ secrets.TEST_OS_PACKAGE_HOPR_IDENTITY_FILE }}
          INPUT_PACKAGER: ${{ inputs.packager }}
          INPUT_TARGET: ${{ inputs.target }}

      - name: Publish package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.download.outputs.package_file_name }}.${{ inputs.extension }}
          path: ${{ github.workspace }}/dist/packages/hoprd-${{ inputs.target }}.${{ inputs.packager }}

      - name: Publish package hash
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.download.outputs.package_file_name }}.${{ inputs.extension }}.sha256
          path: ${{ github.workspace }}/dist/packages/hoprd-${{ inputs.target }}.${{ inputs.packager }}.sha256

      - name: Publish package signature
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.download.outputs.package_file_name }}.${{ inputs.extension }}.asc
          path: ${{ github.workspace }}/dist/packages/hoprd-${{ inputs.target }}.${{ inputs.packager }}.asc

