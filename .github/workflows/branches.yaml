---
name: Branches

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: branches-${{ github.ref_name }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  coverage:
    name: Coverage
    uses: hoprnet/hopr-workflows/.github/workflows/tests.yaml@68c55f5bd5bd5a74a92b03f7cd72970f862894d0 # workflow-tests-v4
    with:
      source_branch: ${{ github.ref_name }}
      enable_unit_tests: false
      enable_integration_tests: false
      enable_nightly_tests: false
      enable_benchmarks: false
      enable_unit_coverage: true
      enable_integration_coverage: true
      unit_coverage_command: |
        nix build -L .#coverage-unit
        cp result coverage.lcov
      integration_coverage_command: |
        nix develop .#coverage -c env NEXTEST_HIDE_PROGRESS_BAR=1 cargo llvm-cov nextest \
          --workspace \
          --test '*' \
          --lcov --output-path coverage.lcov \
          -j 1
      runner_unit: depot-ubuntu-24.04-16
      runner_integration: depot-ubuntu-24.04-8
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
  benchmarks:
    name: Benchmarks
    needs: coverage
    uses: hoprnet/hopr-workflows/.github/workflows/benchmarks.yaml@main
    with:
      source_branch: ${{ github.ref_name }}
      runner: self-hosted-hoprnet-bigger
      project: ${{ github.event.repository.name }}
      run_benchmarks: true
      is_pr: false
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      bencher_api_token: ${{ secrets.BENCHER_API_TOKEN }}
      zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
      zulip_email: ${{ secrets.ZULIP_EMAIL }}
