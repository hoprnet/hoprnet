---
name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build-binaries:
    name: Binary ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86_64-linux
            runner: depot-ubuntu-24.04-8
            build_command: nix build -L .#binary-hoprd-x86_64-linux
    uses: hoprnet/hopr-workflows/.github/workflows/build-binaries.yaml@build-binaries-v2
    permissions:
      contents: read
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      architecture: ${{ matrix.architecture }}
      cachix_cache_name: hoprnet
      build_file: ./hopr/hopr-lib/Cargo.toml
      build_command: ${{ matrix.build_command }}
      binary: hoprd
      runner: ${{ matrix.runner }}
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      gpg_private_key: ${{ secrets.GPG_HOPRNET_PRIVATE_KEY }}
  build-docker:
    name: Docker
    uses: hoprnet/hopr-workflows/.github/workflows/build-docker.yaml@build-docker-v1
    needs: build-binaries
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      build_matrix: >-
        [
          {
            "runner": "depot-ubuntu-24.04-4",
            "architecture": "x86_64-linux",
            "build_command": "nix build -L .#docker-hoprd-x86_64-linux",
            "smoke_test_command": "nix develop -c just smoke-test"
          }
        ]
      cachix_cache_name: hoprnet
      build_file: ./hopr/hopr-lib/Cargo.toml
      docker_image_name: hoprd
      docker_image_format: skopeo
    secrets:
      gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
      docker_hub_username: ${{ secrets.DOCKER_HUB_USERNAME }}
      docker_hub_token: ${{ secrets.DOCKER_HUB_TOKEN }}
  release:
    name: Close release
    needs:
      - build-binaries
      - build-docker
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@4e3c270b51ed1817bc0b0f6996dfc8a7b0e757c1 # release-version-v2
        with:
          source_branch: ${{ github.ref_name }}
          file: ./hopr/hopr-lib/Cargo.toml
          release_type: ${{ inputs.release_type }}
          package_name: hoprd
          cachix_cache_name: hoprnet
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: HOPRd
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
          github_token: ${{ secrets.GH_RUNNER_TOKEN }}
  deploy-staging:
    name: Deploy Gnosis Staging
    runs-on: depot-ubuntu-24.04
    needs: [build-docker, release]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Restart Hoprd
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.GNOSIS_GITHUB_WORKFLOW_TOKEN }}
          repository: gnosis/gnosis_vpn-infrastructure
          event-type: restart_hoprd
          client-payload: |-
            {
              "environment": "staging"
            }
  build-dappnode:
    name: Build dappNode
    needs:
      - release
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/generate-dappnode-pr.yaml
    with:
      source_repo: ${{ github.repository }}
      source_branch: ${{ github.ref_name }}
      network: dufour
    secrets:
      GCP_SA_GITHUB_RUNNER: ${{ secrets.GCP_SA_GITHUB_RUNNER }}
      GH_RUNNER_TOKEN: ${{ secrets.GH_RUNNER_TOKEN }}
