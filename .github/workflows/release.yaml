---
name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build-library:
    name: Build & Publish Library
    uses: hoprnet/hopr-workflows/.github/workflows/build-library.yaml@45221eb1aadfc5c46751306c5c7d6d291c8a24b3 # build-library-v3
    permissions:
      contents: read
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      version_type: release
      architecture: x86_64-linux
      runner: depot-ubuntu-24.04-4
    secrets:
      cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
  release:
    name: Close release
    needs:
      - build-library
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@5b0f0e6c7e3a02e30a33b9f5150fb5b118676e58 # 0.11.0
        with:
          source_branch: ${{ github.ref_name }}
          file: ./hopr/hopr-lib/Cargo.toml
          release_type: ${{ inputs.release_type }}
          package_name: hoprd
          cachix_cache_name: hoprnet
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: HOPRd
          zulip_topic: Releases
          github_app_private_key: ${{ secrets.GH_APP_HOPRNET_BOT_PRIVATE_KEY }}
  build-dappnode:
    name: Build dappNode
    needs:
      - release
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/generate-dappnode-pr.yaml
    with:
      source_repo: ${{ github.repository }}
      source_branch: ${{ github.ref_name }}
      network: dufour
    secrets:
      GH_RUNNER_TOKEN: ${{ secrets.GH_RUNNER_TOKEN }}
