[package]
name = "hopr-transport-p2p"
description = "rust-libp2p based p2p transport implementation"
version = "0.9.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "transport", "libp2p", "p2p"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "tests/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]

[features]
default = []
telemetry = ["dep:lazy_static", "hopr-api/types-telemetry"]
runtime-tokio = ["libp2p/tokio", "hopr-transport-probe/runtime-tokio"]
transport-quic = ["libp2p/quic"]

[dependencies]
async-broadcast = { workspace = true }
async-trait = { workspace = true }
backon = { workspace = true }
futures = { workspace = true }
lazy_static = { workspace = true, optional = true }
libp2p = { workspace = true, features = [
  "noise",
  "macros",
  "autonat",
  "dns",
  "identify",
  "tcp",
  "yamux",
] }
libp2p-stream = { workspace = true }
multiaddr = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

dashmap = { workspace = true }

hopr-api = { workspace = true, features = ["ct", "network"] }
hopr-utils = { workspace = true, features = ["network-types"] }

[dev-dependencies]
anyhow = { workspace = true }
bytes = { workspace = true }
lazy_static = { workspace = true }
more-asserts = { workspace = true }
tokio = { workspace = true }

hopr-api = { workspace = true, features = ["network", "graph", "types-random"] }

hopr-crypto-packet = { workspace = true }

hopr-utils = { workspace = true, features = ["platform"] }
hopr-transport-probe = { workspace = true }
hopr-transport = { workspace = true }
