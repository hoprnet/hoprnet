[package]
name = "hopr-network-graph"
version = "0.3.0"
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Implementation of the HOPR network graph."
edition.workspace = true
rust-version.workspace = true
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"
publish = false

[lib]
crate-type = ["rlib"]

[features]
default = ["petgraph"]
all-benchmarks = []
petgraph = ["dep:petgraph", "dep:indexmap", "dep:rand"]
graph-api = ["petgraph"]

[dependencies]
anyhow = { workspace = true }
bimap = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true, optional = true, features = ["rayon"] }
parking_lot = { workspace = true }
petgraph = { workspace = true, optional = true, features = ["rayon"] }
rand = { workspace = true, optional = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

hopr-api = { workspace = true, features = ["ct", "graph", "network"] }

hopr-utils = { workspace = true, features = [
  "statistics-types",
  "statistics-types-moving",
] }

[dev-dependencies]
assertables = { workspace = true }
criterion = { workspace = true }
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
tokio = { workspace = true }

[[bench]]
name = "traverse_bench"
harness = false
