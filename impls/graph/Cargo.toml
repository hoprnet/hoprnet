[package]
name = "hopr-network-graph"
description = "Implementation of the HOPR network graph"
version = "0.3.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "graph", "routing"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming", "algorithms"]
authors.workspace = true
rust-version.workspace = true
include = [
  "README.md",
  "src/**/*.rs",
  "benches/**/*.rs",
  "Cargo.toml",
  "LICENSE",
]

[lib]
crate-type = ["rlib"]

[features]
default = ["petgraph"]
all-benchmarks = []
petgraph = ["dep:petgraph", "dep:indexmap", "dep:rand"]
graph-api = ["petgraph"]
telemetry = ["hopr-api/types-telemetry"]

[dependencies]
anyhow = { workspace = true }
bimap = { workspace = true }
futures = { workspace = true }
lazy_static = { workspace = true }
indexmap = { workspace = true, optional = true, features = ["rayon"] }
parking_lot = { workspace = true }
petgraph = { workspace = true, optional = true, features = ["rayon"] }
rand = { workspace = true, optional = true }
smallvec = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

hopr-api = { workspace = true, features = ["ct", "graph", "network"] }

hopr-utils = { workspace = true, features = [
  "statistics-types",
  "statistics-types-moving",
] }

[dev-dependencies]
assertables = { workspace = true }
criterion = { workspace = true }
hex-literal = { workspace = true }
insta = { workspace = true, features = ["yaml"] }
tokio = { workspace = true }

[[bench]]
name = "traverse_bench"
harness = false
