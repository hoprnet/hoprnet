[package]
name = "hopr-node"
version = "0.1.0"
authors = ["HOPR Association <tech@hoprnet.org>"]
edition.workspace = true
rust-version.workspace = true
description = "Canonical assembly of hopr-lib with concrete impls; integration-test rig for the HOPR protocol"
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"
publish = false

[lib]
crate-type = ["rlib"]

[features]
default = ["runtime-tokio"]
runtime-tokio = [
  "dep:tokio",
  "dep:validator",
  "hopr-lib/runtime-tokio",
  "hopr-transport-p2p/runtime-tokio",
  "hopr-transport-p2p/transport-quic",
  "hopr-chain-connector/runtime-tokio",
]
session-server = [
  "dep:tokio",
  "dep:validator",
  "hopr-lib/session-server",
  "dep:hopr-session-server-forwarder",
  "hopr-session-server-forwarder/runtime-tokio",
]
session-client = ["hopr-lib/session-client"]
explicit-path = ["session-client", "hopr-lib/explicit-path"]
testing = [
  "runtime-tokio",
  "session-client",
  "session-server",
  "dep:async-trait",
  "dep:futures-time",
  "dep:tokio-util",
  "dep:hex-literal",
  "dep:lazy_static",
  "dep:rand",
  "dep:rstest",
  "hopr-chain-connector/testing",
]
telemetry = [
  "hopr-lib/telemetry",
  "hopr-api/types-telemetry",
  "dep:lazy_static",
  "hopr-session-server-forwarder?/telemetry",
]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true, optional = true }
futures = { workspace = true }
futures-time = { workspace = true, optional = true }
hex-literal = { workspace = true, optional = true }
lazy_static = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
rstest = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }
tracing = { workspace = true }
validator = { workspace = true, optional = true }

hopr-api = { workspace = true }
hopr-lib = { workspace = true, features = ["utils_parallel"] }
hopr-session-server-forwarder = { workspace = true, optional = true }
# impls
hopr-chain-connector = { workspace = true }
hopr-ct-full-network = { workspace = true }
hopr-network-graph = { workspace = true, features = ["petgraph", "graph-api"] }
hopr-ticket-manager = { workspace = true, features = ["redb"] }
hopr-transport-p2p = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
rstest = { workspace = true }
serial_test = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }

hopr-node = { workspace = true, features = ["testing"] }
hopr-api = { workspace = true, features = ["types-random", "types-telemetry"] }
opentelemetry_sdk = { workspace = true, features = [
  "metrics",
  "experimental_metrics_custom_reader",
  "testing",
] }
opentelemetry-prometheus-text-exporter = { workspace = true }

hopr-lib = { workspace = true, features = ["telemetry"] }
