[package]
name = "hopr-strategy"
description = "Contains implementations of different HOPR strategies"
version = "0.20.0"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "strategy", "channels"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]
doctest = false

[features]
default = []
runtime-tokio = ["hopr-utils/runtime-tokio"]
telemetry = ["hopr-api/types-telemetry"]
## Strategy features — each enables one strategy implementation.
strategy-auto-funding = []
strategy-auto-redeeming = []
strategy-closure-finalizer = []
strategy-channel-lifecycle = []
strategy-pix = ["dep:redb", "dep:scrypt", "dep:chacha20poly1305"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
dashmap = { workspace = true, features = ["inline"] }
futures = { workspace = true }
futures-time = { workspace = true }
futures-concurrency = { workspace = true }
humantime-serde = { workspace = true }
lazy_static = { workspace = true }
serde = { workspace = true }
serde_with = { workspace = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = ["node", "serde", "types-random"] }
hopr-utils = { workspace = true, features = ["runtime-tokio"] }
moka = { workspace = true, features = ["sync"] }
multiaddr = { workspace = true }
redb = { workspace = true, optional = true }
scrypt = { workspace = true, optional = true }
chacha20poly1305 = { workspace = true, optional = true }
parking_lot = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
hex-literal = { workspace = true }
hopr-utils = { workspace = true, features = ["runtime-tokio"] }
hopr-chain-connector = { workspace = true, features = [
  "testing",
  "runtime-tokio",
] }
hopr-api = { workspace = true, features = ["types-random"] }
insta = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]

[package.metadata.cargo-shear]
ignored = []
