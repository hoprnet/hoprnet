[package]
name = "hopr-ct-immediate"
description = "Basic implementation of the CT Telemetry functionality as specified in the HOPR RFCs describing the 0-hop probing"
version = "0.2.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "cover-traffic"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = [
  "README.md",
  "src/**/*.rs",
  "Cargo.toml",
  "LICENSE",
]

[lib]
crate-type = ["rlib"]

[features]
default = []
serde = ["dep:serde", "dep:humantime-serde", "hopr-api/serde"]

[dependencies]
anyhow = { workspace = true }
futures = { workspace = true }
smart-default = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
humantime-serde = { workspace = true, optional = true }
validator = { workspace = true }
moka = { workspace = true }

hopr-api = { workspace = true, features = [
  "ct",
  "network",
  "graph",
  "types-random",
] }
hopr-utils = { workspace = true, features = ["runtime-tokio"] }

[dev-dependencies]
tokio = { workspace = true }
lazy_static = { workspace = true }
hopr-network-graph = { workspace = true, features = ["petgraph"] }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
