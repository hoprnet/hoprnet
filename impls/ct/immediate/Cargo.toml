[package]
name = "hopr-ct-immediate"
version = "0.2.1"
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Basic implementation of the CT Telemetry functionality as specified in the HOPR RFCs describing the 0-hop probing."
edition.workspace = true
rust-version.workspace = true
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = []
serde = ["dep:serde", "dep:humantime-serde", "hopr-api/serde"]

[dependencies]
anyhow = { workspace = true }
futures = { workspace = true }
smart-default = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
humantime-serde = { workspace = true, optional = true }
validator = { workspace = true }
moka = { workspace = true }

hopr-api = { workspace = true, features = [
  "ct",
  "network",
  "graph",
  "types-random",
] }
hopr-async-runtime = { workspace = true, features = ["runtime-tokio"] }

[dev-dependencies]
tokio = { workspace = true }
lazy_static = { workspace = true }
hopr-network-graph = { workspace = true, features = ["petgraph"] }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
