[package]
name = "hopr-ct-full-network"
version = "0.2.0"
authors = ["HOPR Association <tech@hoprnet.org>"]
description = "Full implementation of the Telemetry functionality as specified in the HOPR RFCs along with optional noise (cover traffic) generation."
edition.workspace = true
rust-version.workspace = true
homepage = "https://hoprnet.org/"
repository = "https://github.com/hoprnet/hoprnet"
license = "GPL-3.0-only"

[lib]
crate-type = ["rlib"]

[features]
default = []
serde = ["dep:serde", "dep:humantime-serde", "hopr-api/serde"]
noise = []

[dependencies]
anyhow = { workspace = true }
cfg-if = { workspace = true }
futures = { workspace = true }
futures-concurrency = { workspace = true }
futures-time = { workspace = true }
smart-default = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
humantime-serde = { workspace = true, optional = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = [
  "ct",
  "network",
  "graph",
  "types-random",
] }
hopr-statistics = { workspace = true, features = ["weighted"] }
hopr-network-graph = { workspace = true, features = ["petgraph"] }

[dev-dependencies]
tokio = { workspace = true, features = ["time"] }
lazy_static = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
