[package]
name = "hopr-ct-full-network"
description = "Full implementation of the Telemetry functionality as specified in the HOPR RFCs along with optional noise (cover traffic) generation"
version = "0.3.0"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "cover-traffic", "mixnet"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "Cargo.toml", "LICENSE"]

[lib]
crate-type = ["rlib"]

[features]
default = []
serde = ["dep:serde", "dep:humantime-serde", "hopr-api/serde"]
noise = []

[dependencies]
anyhow = { workspace = true }
cfg-if = { workspace = true }
futures = { workspace = true }
futures-time = { workspace = true }
tracing = { workspace = true }
smart-default = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
humantime-serde = { workspace = true, optional = true }
validator = { workspace = true }

hopr-api = { workspace = true, features = [
  "ct",
  "network",
  "graph",
  "types-random",
] }
hopr-utils = { workspace = true, features = [
  "statistics-types",
  "statistics-types-weighted",
] }
hopr-network-graph = { workspace = true, features = ["petgraph"] }

[dev-dependencies]
tokio = { workspace = true, features = ["time"] }
lazy_static = { workspace = true }

[package.metadata.cargo-machete]
ignored = ["humantime-serde"]
