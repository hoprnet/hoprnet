[package]
name = "hopr-chain-connector"
description = "Implementation of HOPR Chain APIs using Blokli client"
version = "0.20.1"
edition.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["hopr", "chain", "ethereum"]
repository.workspace = true
homepage.workspace = true
categories = ["network-programming"]
authors.workspace = true
rust-version.workspace = true
include = ["README.md", "src/**/*.rs", "tests/**/*.rs", "Cargo.toml", "LICENSE"]

[features]
runtime-tokio = ["hopr-utils/runtime-tokio"]
testing = ["dep:hex", "blokli-client/testing"]

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
atomic_enum = { workspace = true }
async-broadcast = { workspace = true }
async-trait = { workspace = true }
blokli-client = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
futures-time = { workspace = true }
futures-concurrency = { workspace = true }
hex = { workspace = true, optional = true }
moka = { workspace = true, features = ["future", "sync"] }
parking_lot = { workspace = true }
petgraph = { workspace = true, features = ["rayon", "graphmap"] }
postcard = { workspace = true }
redb = { workspace = true }
serde_json = { workspace = true }
smart-default = { workspace = true }
thiserror = { workspace = true }
validator = { workspace = true }
tracing = { workspace = true }
tempfile = { workspace = true }

hopr-api = { workspace = true, features = [
  "chain",
  "node",
  "types-random",
  "serde",
  "types-with-bindings",
] }
hopr-utils = { workspace = true }

[dev-dependencies]
blokli-client = { workspace = true, features = ["testing"] }
hex = { workspace = true }
hopr-utils = { workspace = true, features = ["runtime-tokio"] }
hex-literal = { workspace = true }
insta = { workspace = true }
lazy_static = { workspace = true }
test-log = { workspace = true }
tokio = { workspace = true }
